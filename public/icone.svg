<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="verre" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#fbfdff" />
      <stop offset="0.5" stop-color="#e2e8f0" />
      <stop offset="1" stop-color="#c8d0db" />
    </linearGradient>
    <radialGradient id="reflet" cx="0.3" cy="0.2" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="feuille" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f48" />
      <stop offset="1" stop-color="#14171b" />
    </linearGradient>
  </defs>

  <!-- Dalle de verre + reflet (liquid glass) -->
  <rect width="512" height="512" fill="url(#verre)" />
  <rect width="512" height="512" fill="url(#reflet)" />

