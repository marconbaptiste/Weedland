name: Sauvegarde base

# Sauvegarde quotidienne de la base Supabase via pg_dump, chiffrée, stockée en
# artefact GitHub (30 jours). Déclenchable aussi à la main (workflow_dispatch).
#
# Secret requis (Settings → Secrets and variables → Actions) :
#   - SUPABASE_DB_PASSWORD : le mot de passe de la base (tel quel, n'importe quels
#       caractères — il n'est PAS mis dans une URL, donc aucun encodage requis)
#   - BACKUP_PASSPHRASE    : mot de passe pour chiffrer/déchiffrer la sauvegarde
#
# L'hôte et l'utilisateur (non secrets) sont définis ci-dessous.
# Restauration : voir SAUVEGARDE.md

on:
  schedule:
    - cron: '0 3 * * *' # tous les jours à 03:00 UTC
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    env:
      PGHOST: aws-1-eu-central-2.pooler.supabase.com
      PGPORT: '5432'
      PGUSER: postgres.nshglljmfskvqxcogdjk
      PGDATABASE: postgres
      DBPASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PASS: ${{ secrets.BACKUP_PASSPHRASE }}
    steps:
      - name: Installer pg_dump 17
        # La base Supabase est en PostgreSQL 17 : pg_dump doit être >= la version
        # du serveur, sinon « server version mismatch ». On installe le client 17.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump + chiffrement
        run: |
          if [ -z "$DBPASS" ] || [ -z "$PASS" ]; then
            echo "Secrets SUPABASE_DB_PASSWORD / BACKUP_PASSPHRASE non définis — sauvegarde ignorée."
            exit 0
          fi
          # Nettoie tout retour à la ligne/CR collé par mégarde dans le secret.
          export PGPASSWORD="$(printf '%s' "$DBPASS" | tr -d '\r\n')"
          echo "DIAG longueur du mot de passe (après nettoyage) : ${#PGPASSWORD}"
          ts=$(date +%Y%m%d-%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump --no-owner --no-privileges -Fc -f dump.pgcustom
          openssl enc -aes-256-cbc -pbkdf2 -salt -in dump.pgcustom -out "weedland-$ts.sql.enc" -pass env:PASS
          rm -f dump.pgcustom
          echo "Sauvegarde créée : weedland-$ts.sql.enc ($(du -h weedland-$ts.sql.enc | cut -f1))"

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: sauvegarde-weedland
          path: weedland-*.sql.enc
          retention-days: 30
          if-no-files-found: ignore
